name: Daily Coding Problem

on:
  schedule:
    # Multiple runs per day (backup triggers)
    - cron: '0 0 * * *'     # 5:30 AM IST
    - cron: '0 6 * * *'     # 11:30 AM IST
    - cron: '0 12 * * *'    # 5:30 PM IST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Random delay (human-like timing)
        run: sleep $((RANDOM % 300))

      - name: Run daily practice script with retry
        run: |
          for i in 1 2 3; do
            python daily_practice.py && break
            echo "Retry $i failed... retrying"
            sleep 5
          done

      - name: Commit changes if any
        run: |
          git config --global user.name "Manas"
          git config --global user.email "manas@example.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes today"
          else
            git commit -m "Daily DSA practice $(date +'%Y-%m-%d')"
            git push
          fi
