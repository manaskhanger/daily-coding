name: Daily Coding Problem

on:
  schedule:
    # Runs multiple times per day (backup triggers)
    - cron: '0 0 * * *'     # 5:30 AM IST
    - cron: '0 6 * * *'     # 11:30 AM IST
    - cron: '0 12 * * *'    # 5:30 PM IST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Random delay (human-like timing)
        run: sleep $((RANDOM % 300))

      - name: Run generator with retry
        run: |
          for i in 1 2 3; do
            python generator.py && break
            echo "Retry $i failed... retrying"
            sleep 5
          done

      - name: Commit changes if any
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@example.com"
          git add .

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes today"
          else
            git commit -m "Daily coding update $(date)"
            git push
          fi
